spring.application.name=tpch-kafka-producer

# Trino connection
trino.host=${TRINO_HOST:localhost}
trino.port=${TRINO_PORT:8080}
trino.catalog=${TRINO_CATALOG:semantic_demo}
trino.schema=${TRINO_SCHEMA:ice_db}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=10

# Producer behaviour
producer.batch.size=${PRODUCER_BATCH_SIZE:10}
producer.interval.ms=${PRODUCER_INTERVAL_MS:5000}

logging.level.com.kafka.producer=INFO
